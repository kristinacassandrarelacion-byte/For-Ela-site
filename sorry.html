<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

background:radial-gradient(circle at top,#5d2a86 0%,#1a0b2e 35%,#050505 100%);

color:white;

padding:20px;

}

.card{

max-width:650px;

width:100%;

background:rgba(18,18,25,.95);

padding:40px;

border-radius:25px;

border:2px solid #8f5cff;

text-align:center;

box-shadow:
0 0 25px rgba(143,92,255,.5),
0 0 60px rgba(143,92,255,.3);

}

h1{

font-family:"Great Vibes",cursive;

font-size:70px;

color:#d9b3ff;

margin-bottom:15px;

}

h2{

margin-bottom:20px;

}

p{

line-height:1.8;

color:#dddddd;

margin-bottom:15px;

}

button{

margin-top:25px;

padding:15px 30px;

font-size:18px;

border:none;

border-radius:15px;

cursor:pointer;

background:linear-gradient(90deg,#6b2dff,#b100ff);

color:white;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="card">

<h1>💜</h1>

<h2>Sorry...</h2>

<p>

This letter wasn't intended for you.

</p>

<p>

It was carefully written for someone very special.

</p>

<p>

Thank you for respecting the sender's privacy.

</p>

<button onclick="window.location.href='create.html'">

Return

</button>

</div>

</body>

</html>
